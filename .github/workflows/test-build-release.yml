name: Test, Build and Release

on:
  push:
    tags: ["v*"]
  pull_request:
    types: [opened, labeled, synchronize]

env:
  FLUTTER_CHANNEL: stable
  FLUTTER_VERSION: 3.35.2

jobs:
  test:
    name: Format, analyze and test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout App Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: app

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Format check
        working-directory: app
        run: dart format --set-exit-if-changed .

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Run tests
        working-directory: app
        run: flutter test

  build:
    name: Build app
    needs: test
    if: ${{ ( startsWith(github.ref, 'refs/tags/') || contains(github.event.pull_request.labels.*.name, '⚗️ Request Build') ) && !github.event.pull_request.head.repo.fork}}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    outputs:
      version_name: ${{ steps.build_options.outputs.version_name }}

    steps:
      - name: Checkout app repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: app

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install pub dependencies
        run: flutter pub get

      - name: Set up keystore
        working-directory: .
        run: |
          PROPERTIES_PATH="./app/android/key.properties"
          echo keyPassword=\${{ secrets.KEY_STORE }} > $PROPERTIES_PATH
          echo storePassword=\${{ secrets.KEY_PASSWORD }} >> $PROPERTIES_PATH
          echo keyAlias=\${{ secrets.KEY_ALIAS }} >> $PROPERTIES_PATH
          echo "${{ secrets.KEYSTORE2 }}" | base64 --decode > app/android/app/key.jks

      - name: Set build options
        id: build_options
        run: |
          SHA=${{ github.event.pull_request.head.sha || github.sha }}
          SHORT_SHA=${SHA:0:7}
          VERSION_NAME="$(echo "$GITHUB_REF_NAME" | tr / _)_$SHORT_SHA"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            FLAVOR="production"
          else
            FLAVOR="staging"
          fi
          echo "flavor=$FLAVOR" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "build_args=--release --flavor $FLAVOR --obfuscate --split-debug-info=build/app/symbols" >> $GITHUB_OUTPUT

      - name: Build APK
        run: flutter build apk ${{ steps.build_options.outputs.build_args }}

      - name: Build app bundle
        run: flutter build appbundle ${{ steps.build_options.outputs.build_args }}

      - name: Build APK for size analysis
        if: contains(github.event.pull_request.labels.*.name, '🧐 Size Analysis')
        run: flutter build apk ${{ steps.build_options.outputs.build_args }} --analyze-size --target-platform android-arm64

      - name: Rename APK & App Bundle
        run: |
          mkdir -p ../build-artifacts
          mv build/app/outputs/flutter-apk/app-${{ steps.build_options.outputs.flavor }}-release.apk ../build-artifacts/DebbyDebs_${{ steps.build_options.outputs.version_name }}.apk
          mv build/app/outputs/bundle/${{ steps.build_options.outputs.flavor }}Release/app-${{ steps.build_options.outputs.flavor }}-release.aab ../build-artifacts/DebbyDebs_${{ steps.build_options.outputs.version_name }}.aab

      - name: Upload APK
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: DebbyDebs ${{ steps.build_options.outputs.version_name }} APK
          path: build-artifacts/DebbyDebs_${{ steps.build_options.outputs.version_name }}.apk

      - name: Upload app bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: DebbyDebs ${{ steps.build_options.outputs.version_name }} AAB
          path: build-artifacts/DebbyDebs_${{ steps.build_options.outputs.version_name }}.aab

      - name: Upload symbols file
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: DebbyDebs ${{ steps.build_options.outputs.version_name }} Symbols
          path: app/build/app/symbols

      - name: Upload size analysis apk
        if: contains(github.event.pull_request.labels.*.name, '🧐 Size Analysis')
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: Size Analysis APK ARM64
          path: /home/runner/.flutter-devtools/apk-code-size-analysis_01.json

  post-request:
    name: Post requested build and size analysis
    needs: build
    if: contains(github.event.pull_request.labels.*.name, '⚗️ Request Build')
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Remove build request label
        uses: IamPekka058/removeLabels@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          labels: |
            - ⚗️ Request Build
            - 🧐 Size Analysis

      - name: Comment artifact links
        uses: RubberDuckCrew/artifact2pr@1d2777cac9898de6a6cb16eb32b5c738ea428787 # v1.1.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-if-no-artifacts: true

  post-build-tagged:
    name: Post tagged build
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: DebbyDebs_${{ needs.build.outputs.version_name }}.apk

      - name: Download app bundle artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: DebbyDebs_${{ needs.build.outputs.version_name }}.aab

      - name: Release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            DebbyDebs_${{ needs.build.outputs.version_name }}.apk
            DebbyDebs_${{ needs.build.outputs.version_name }}.aab
